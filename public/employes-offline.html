<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — Aiman Équipe</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      text-align: center;
      padding: 2rem;
    }
    img { width: 80px; height: auto; margin-bottom: 2rem; opacity: .85; }
    h1 { font-size: 1.25rem; font-weight: 600; margin-bottom: .5rem; }
    p { font-size: .875rem; color: #999; margin-bottom: 2rem; max-width: 280px; }
    button {
      background: #E50000;
      color: #fff;
      border: none;
      border-radius: 9999px;
      padding: .75rem 2rem;
      font-size: .875rem;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active { opacity: .8; }
  </style>
</head>
<body>
  <img src="/logo/logo-white.png" alt="Aiman Rénovation" />
  <h1>Vous êtes hors ligne</h1>
  <p>Vérifiez votre connexion internet puis réessayez.</p>
  <button onclick="location.reload()">Réessayer</button>
</body>
</html>
