name: UltraReview IA + PR Review Toolkit

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  ultrareview:
    name: UltraReview IA — 4 passes (sécu + perf + logique + conventions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run UltraReview with Claude Code
        uses: anthropics/claude-code-action@main
        with:
          prompt: /ultrareview
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}

  pr-review-toolkit:
    name: PR Review Toolkit — silent-failure-hunter + type-design + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run PR Review Toolkit
        uses: anthropics/claude-code-action@main
        with:
          prompt: /pr-review-toolkit:review-pr
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
